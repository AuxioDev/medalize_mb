name: medalize_mb
description: "Medalize mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.0.0
  flutter_secure_storage: ^9.0.0
  go_router: ^14.0.0
  flutter_riverpod: ^2.0.0
  table_calendar: ^3.1.0
  cached_network_image: ^3.3.0
  intl: ^0.20.2
  image_picker: ^1.1.0
  file_picker: ^8.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  slang: ^4.4.0
  slang_flutter: ^4.4.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  local_auth: ^3.0.1
  device_info_plus: ^12.4.0
  geolocator: ^14.0.0
  permission_handler: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  slang_build_runner: ^4.4.0
  build_runner: ^2.4.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App launcher icon. PLACEHOLDER brand icon (blue gradient + medical cross);
# replace assets/icon/* with final art, then run:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  ios: true
  android: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "assets/icon/app_icon_bg.png"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
